# Optional: Render Dashboard → New → Blueprint → connect this repo.
# Frontend defaults to https://chexit.onrender.com — VITE_CHEXIT_API_URL on Vercel is optional unless you change the API host.
# CORS: *.vercel.app is allowed via CHEXIT_CORS_ORIGIN_REGEX by default; add CHEXIT_CORS_ORIGINS for custom domains.
# /predict can take many minutes — pick an instance with enough RAM/CPU for TensorFlow.

services:
  - type: web
    name: chexit-api
    runtime: python
    buildCommand: pip install -r chexit-backend/requirements.txt
    startCommand: cd chexit-backend && PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: CHEXIT_CORS_ORIGINS
        sync: false
